<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kanto Cuts</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-color: #D4AF37; /* Gold */
            --dark-color: #111111;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=2072&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--primary-color);
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #000;
            margin-bottom: 5px;
        }

        .card-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 12px 20px;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
            background-color: #fff;
        }

        .btn-gold {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-gold:hover {
            background-color: #000;
            color: #fff;
            transform: translateY(-2px);
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <i class="fas fa-scissors logo-icon"></i>
    <h2 class="card-title">Kanto Cuts</h2>
    <p class="card-subtitle">Login to your account</p>

    <form id="loginForm">
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-4">
            <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        
        <button type="submit" class="btn btn-gold mb-3">
            <i class="fas fa-sign-in-alt me-2"></i>Login
        </button>
        
        <div class="links">
            <p class="mb-0">No account? <a href="signup.html">Sign Up</a></p>
        </div>
    </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const btn = document.querySelector("button");
    const originalText = btn.innerHTML;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Verifying...`;
    btn.disabled = true;

    try {
        const response = await fetch("api.php?route=login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value
            })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem("customer_id", data.customer_id);
            alert("Login Successful!");
            window.location.href = "index.html";
        } else {
            alert("Invalid username or password");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    } catch (error) {
        alert("Cannot connect to server.");
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});
</script>

</body>
</html>
