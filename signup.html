<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Kanto Cuts</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-color: #D4AF37; /* Gold */
            --dark-color: #111111;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            background-image: radial-gradient(#ddd 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--primary-color);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #000;
            margin-bottom: 5px;
        }

        .card-subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 12px 20px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn-dark-custom {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-dark-custom:hover {
            background-color: var(--primary-color);
            color: #000;
            transform: translateY(-2px);
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="signup-card text-center">
    <h2 class="card-title">Create Account</h2>
    <p class="card-subtitle">Join the Kanto Cuts family</p>

    <form id="signupForm">
        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="text" id="name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="col-md-6 mb-3">
                <input type="text" id="contact" class="form-control" placeholder="Contact Number" required>
            </div>
        </div>
        
        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Email Address" required>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="col-md-6 mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
        </div>

        <button type="submit" class="btn btn-dark-custom mb-3">
            <i class="fas fa-user-plus me-2"></i>Sign Up
        </button>
        
        <div class="links">
            <p class="mb-0">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </form>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const btn = document.querySelector("button");
    btn.innerHTML = "Creating Account...";
    btn.disabled = true;

    const response = await fetch("http://localhost:3000/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            customer_name: document.getElementById("name").value,
            contact_number: document.getElementById("contact").value,
            email: document.getElementById("email").value,
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await response.json();

    if (data.message === "Account Created") {
        alert("Signup successful! Please login now.");
        window.location.href = "login.html";
    } else {
        alert("Error: " + JSON.stringify(data));
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Sign Up';
        btn.disabled = false;
    }
});
</script>

</body>
</html>
